<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Vela</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated aurora background -->
    <div class="aurora" aria-hidden="true">
        <div class="aurora__orb aurora__orb--1"></div>
        <div class="aurora__orb aurora__orb--2"></div>
        <div class="aurora__orb aurora__orb--3"></div>
        <div class="aurora__grid"></div>
    </div>

    <main class="wrapper">
        <div class="card">

            <!-- Logo -->
            <div class="logo" aria-label="Vela">
                <div class="logo__icon">
                    <svg width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 3L29 27H3L16 3Z" fill="url(#logoGrad)"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="3" y1="27" x2="29" y2="3" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#818cf8"/>
                                <stop offset="1" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo__name">Vela</span>
            </div>

            <!-- Heading -->
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to continue to your workspace</p>

            <!-- Alert box -->
            <div class="alert alert--error" id="alert" role="alert" aria-live="polite" hidden>
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5v3M8 10.5h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="alert-msg">Incorrect email or password.</span>
            </div>

            <form id="login-form" novalidate>

                <!-- Email -->
                <div class="field" id="field-email">
                    <label for="email" class="field__label">Email address</label>
                    <div class="field__input-wrap">
                        <svg class="field__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="3"/>
                            <path d="M2 8l10 6 10-6"/>
                        </svg>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            autocomplete="email"
                            placeholder="you@example.com"
                            required
                        >
                    </div>
                    <p class="field__error" id="email-error" role="alert"></p>
                </div>

                <!-- Password -->
                <div class="field" id="field-password">
                    <div class="field__label-row">
                        <label for="password" class="field__label">Password</label>
                        <a href="#" class="link link--small" tabindex="-1">Forgot password?</a>
                    </div>
                    <div class="field__input-wrap">
                        <svg class="field__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            required
                            minlength="6"
                        >
                        <button
                            type="button"
                            class="toggle-pw"
                            id="toggle-pw"
                            aria-label="Show password"
                            aria-controls="password"
                            aria-pressed="false"
                        >
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M17.94 17.94A10.01 10.01 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <p class="field__error" id="password-error" role="alert"></p>
                </div>

                <!-- Remember me -->
                <div class="row-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkmark" aria-hidden="true"></span>
                        Remember me for 30 days
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="btn-submit__text">Sign in</span>
                    <span class="btn-submit__spinner" aria-hidden="true"></span>
                </button>

            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <!-- OAuth placeholder buttons -->
            <div class="oauth-row">
                <button type="button" class="btn-oauth" aria-label="Continue with Google">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Google</span>
                </button>
                <button type="button" class="btn-oauth" aria-label="Continue with GitHub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                    </svg>
                    <span>GitHub</span>
                </button>
            </div>

            <p class="register-prompt">
                No account? <a href="#" class="link link--accent">Create one free →</a>
            </p>

        </div>

        <p class="footer-note">
            By signing in, you agree to our <a href="#" class="link link--dim">Terms</a> and <a href="#" class="link link--dim">Privacy Policy</a>.
        </p>
    </main>

    <script src="script.js"></script>
</body>
</html>
